<!DOCTYPE html>
<html>
<head>
    <title>Traffic Signal Simulator</title>
</head>
<body>

<script>

let signal = "red";

switch (signal.toLowerCase()) {

    case "red":
        document.write("Stop");
        break;

    case "yellow":
        document.write("Get Ready");
        break;

    case "green":
        document.write("Go");
        break;

    default:
        document.write("Invalid Signal Color");
}

</script>

</body>
</html>
