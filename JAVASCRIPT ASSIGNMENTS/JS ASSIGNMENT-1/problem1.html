<!DOCTYPE html>
<html>
<head>
    <title>Responsive Practice</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background-color: lightblue;
            margin: 0;
        }

        h1 {
            text-align: center;
        }

        nav {
            background-color: navy;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 18px;
        }

        .content {
            padding: 20px;
            font-size: 18px;
        }

        @media screen and (max-width: 600px) {

            body {
                background-color: lightcoral; 
            }

            nav {
                flex-direction: column;
                align-items: center;
            }

            nav a {
                margin: 10px 0;
                font-size: 16px; 
            }

            .content {
                font-size: 14px; 
            }
        }

    </style>
</head>

<body>

    <h1>My Responsive Website</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>
    <div class="content">
        <p>
            This page changes layout and styling based on screen size.
            Resize the browser window to see the effect.
        </p>
    </div>

</body>
</html>
