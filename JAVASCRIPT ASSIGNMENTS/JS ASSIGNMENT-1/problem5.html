<!DOCTYPE html>
<html>
<head>
    <title>Number Analysis Tool</title>
</head>
<body>

<script>

let num = 7;   

let result = (num >= 0) ? "Positive Number" : "Negative Number";
document.write("Number: " + num + "<br>");
document.write("Sign: " + result + "<br>");

if (num % 2 === 0) {
    document.write("Parity: Even Number<br>");
} else {
    document.write("Parity: Odd Number<br>");
}
document.write("Numbers from 1 to " + num + ":<br>");

for (let i = 1; i <= num; i++) {
    document.write(i + " ");
}

</script>

</body>
</html>
