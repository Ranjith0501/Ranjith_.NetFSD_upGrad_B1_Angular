<!DOCTYPE html>
<html>
<head>
    <title>Bank Account System</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        input { margin: 5px; padding: 5px; }
        button { margin: 5px; padding: 6px 12px; }
        pre { background: #f4f4f4; padding: 10px; }
    </style>
</head>
<body>

<h1>🏦 Bank Account System</h1>

<label>Account Holder:</label>
<input type="text" id="name" placeholder="Enter Name">

<label>Initial Balance:</label>
<input type="number" id="initialBalance" placeholder="Enter Balance">

<button onclick="createAccount()">Create Account</button>

<hr>

<label>Amount:</label>
<input type="number" id="amount" placeholder="Enter Amount">

<button onclick="depositMoney()">Deposit</button>
<button onclick="withdrawMoney()">Withdraw</button>
<button onclick="showBalance()">Check Balance</button>

<h3>Output:</h3>
<pre id="output"></pre>

<script>

let account; 
class BankAccount {

    constructor(accountHolder, balance) {
        this.accountHolder = accountHolder;
        this.balance = balance;
    }

    deposit(amount) {
        if (amount <= 0) {
            return "Deposit amount must be greater than 0.";
        }
        this.balance += amount;
        return `₹${amount} deposited successfully.`;
    }

    withdraw(amount) {
        if (amount <= 0) {
            return "Withdrawal amount must be greater than 0.";
        }

        if (amount > this.balance) {
            return "Insufficient balance. Withdrawal denied.";
        }

        this.balance -= amount;
        return `₹${amount} withdrawn successfully.`;
    }

    checkBalance() {
        return `Account Holder: ${this.accountHolder}
Current Balance: ₹${this.balance}`;
    }
}
function createAccount() {
    let name = document.getElementById("name").value;
    let balance = parseFloat(document.getElementById("initialBalance").value);

    if (!name || isNaN(balance)) {
        document.getElementById("output").textContent =
            "Please enter valid account details.";
        return;
    }

    account = new BankAccount(name, balance);

    document.getElementById("output").textContent =
        "Account created successfully for " + name;
}
function depositMoney() {
    if (!account) {
        document.getElementById("output").textContent =
            "Please create an account first.";
        return;
    }

    let amount = parseFloat(document.getElementById("amount").value);
    let message = account.deposit(amount);

    document.getElementById("output").textContent = message;
}
function withdrawMoney() {
    if (!account) {
        document.getElementById("output").textContent =
            "Please create an account first.";
        return;
    }

    let amount = parseFloat(document.getElementById("amount").value);
    let message = account.withdraw(amount);

    document.getElementById("output").textContent = message;
}
function showBalance() {
    if (!account) {
        document.getElementById("output").textContent =
            "Please create an account first.";
        return;
    }

    document.getElementById("output").textContent =
        account.checkBalance();
}

</script>
</body>
</html>
