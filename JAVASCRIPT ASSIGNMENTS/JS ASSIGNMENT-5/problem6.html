<!DOCTYPE html>
<html>
<head>
    <title>Shape Area Calculator - Polymorphism</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        button { padding: 6px 12px; margin-top: 10px; }
        pre { background: #f4f4f4; padding: 10px; }
    </style>
</head>
<body>

<h1>🔷 Shape Area Calculator (Polymorphism)</h1>

<button onclick="runExample()">Calculate Areas</button>

<h3>Output:</h3>
<pre id="output"></pre>

<script>

class Shape {
    calculateArea() {
        return 0;
    }
}

class Circle extends Shape {
    constructor(radius) {
        super();
        this.radius = radius;
    }

    calculateArea() {
        return Math.PI * this.radius * this.radius;
    }
}

class Rectangle extends Shape {
    constructor(width, height) {
        super();
        this.width = width;
        this.height = height;
    }

    calculateArea() {
        return this.width * this.height;
    }
}

class Triangle extends Shape {
    constructor(base, height) {
        super();
        this.base = base;
        this.height = height;
    }

    calculateArea() {
        return 0.5 * this.base * this.height;
    }
}

function runExample() {

    let shapes = [
        new Circle(5),
        new Rectangle(10, 4),
        new Triangle(6, 3)
    ];

    let result = "";

    shapes.forEach((shape, index) => {
        result += `Shape ${index + 1} Area: ${shape.calculateArea().toFixed(2)}\n`;
    });

    document.getElementById("output").textContent = result;
}

</script>

</body>
</html>
