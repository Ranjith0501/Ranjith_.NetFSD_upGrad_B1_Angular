<!DOCTYPE html>
<html>
<head>
    <title>User Info Display</title>
</head>
<body>

<h2>User Information</h2>

<button onclick="showUser()">Display User Info</button>

<p id="name"></p>
<p id="age"></p>
<p id="city"></p>

<script>

let user = {
    name: "Ranjith",
    age: 23,
    city: "Hyderabad"
};

function showUser() {
    displayUserInfo(user);
}
function displayUserInfo(userObj) {

    document.getElementById("name").innerHTML =
        "Name: " + userObj.name;

    document.getElementById("age").innerHTML =
        "Age: " + userObj.age;

    document.getElementById("city").innerHTML =
        "City: " + userObj.city;
}

</script>

</body>
</html>
