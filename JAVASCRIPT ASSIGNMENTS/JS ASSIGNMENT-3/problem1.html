<!DOCTYPE html>
<html>
<head>
    <title>Personal Notes Saver</title>
</head>
<body onload="loadNote()">

    <h2>Daily Personal Notes</h2>
    <textarea id="note" rows="8" cols="40" 
        placeholder="Write your note here..."></textarea>
    <br><br>
    <button onclick="saveNote()">Save</button>
    <button onclick="clearNote()">Clear</button>

    <p id="message"></p>

    <script>
        function saveNote() {

            let text = document.getElementById("note").value;

            localStorage.setItem("myNote", text);

            document.getElementById("message").innerHTML =
                "Note Saved Successfully!";
        }
        function loadNote() {

            let savedNote = localStorage.getItem("myNote");

            if (savedNote) {
                document.getElementById("note").value = savedNote;
            }
        }
        function clearNote() {

            localStorage.removeItem("myNote");

            document.getElementById("note").value = "";

            document.getElementById("message").innerHTML =
                "Note Cleared!";
        }
    </script>
</body>
</html>
