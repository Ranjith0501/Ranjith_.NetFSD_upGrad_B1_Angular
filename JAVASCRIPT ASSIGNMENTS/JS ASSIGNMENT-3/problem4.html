<!DOCTYPE html>
<html>
<head>
    <title>Mini Expense Tracker</title>
</head>
<body>

<h2>Mini Expense Tracker</h2>

<label>Title:</label><br>
<input type="text" id="title"><br><br>

<label>Amount:</label><br>
<input type="number" id="amount"><br><br>

<label>Date:</label><br>
<input type="date" id="date"><br><br>

<button onclick="addExpense()">Add Expense</button>
<button onclick="viewExpenses()">View Expenses</button>
<button onclick="deleteExpense()">Delete Expense</button>

<h3>Expense List</h3>
<ul id="expenseList"></ul>

<script>

let db = openDatabase("ExpenseDB", "1.0", "Expense Database", 2 * 1024 * 1024);

db.transaction(function(tx) {

    tx.executeSql(
        "CREATE TABLE IF NOT EXISTS expenses (id INTEGER PRIMARY KEY AUTOINCREMENT, title TEXT, amount REAL, date TEXT)"
    );

}, function(error) {
    console.log("Transaction Error:", error.message);
});

function addExpense() {

    let title = document.getElementById("title").value;
    let amount = document.getElementById("amount").value;
    let date = document.getElementById("date").value;

    db.transaction(function(tx) {

        tx.executeSql(
            "INSERT INTO expenses (title, amount, date) VALUES (?, ?, ?)",
            [title, amount, date],
            function() {
                alert("Expense Added Successfully!");
            },
            function(tx, error) {
                console.log("Insert Error:", error.message);
            }
        );

    });
}
function viewExpenses() {

    db.transaction(function(tx) {

        tx.executeSql(
            "SELECT * FROM expenses",
            [],
            function(tx, results) {

                let list = document.getElementById("expenseList");
                list.innerHTML = "";

                for (let i = 0; i < results.rows.length; i++) {

                    let item = results.rows.item(i);

                    let li = document.createElement("li");

                    li.innerHTML =
                        "ID: " + item.id +
                        " | " + item.title +
                        " | ₹" + item.amount +
                        " | " + item.date;

                    list.appendChild(li);
                }
            },
            function(tx, error) {
                console.log("Select Error:", error.message);
            }
        );

    });
}
function deleteExpense() {

    let id = prompt("Enter Expense ID to delete:");

    db.transaction(function(tx) {

        tx.executeSql(
            "DELETE FROM expenses WHERE id = ?",
            [id],
            function() {
                alert("Expense Deleted!");
                viewExpenses();
            },
            function(tx, error) {
                console.log("Delete Error:", error.message);
            }
        );

    });
}
</script>
</body>
</html>
